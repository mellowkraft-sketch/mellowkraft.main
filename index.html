    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is MellowKraft?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MellowKraft is a custom ecommerce engineering company that builds headless commerce platforms for D2C brands in India that have outgrown Shopify. We replace platform-dependent stacks with fully owned custom infrastructure — including storefront, OMS, IMS, CRM, and marketing layers."
          }
        },
        {
          "@type": "Question",
          "name": "Is MellowKraft a Shopify alternative?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. MellowKraft replaces Shopify with a fully custom commerce stack. Unlike Shopify, there is no platform success tax on your revenue, no template ceilings, and you retain full ownership of your data and architecture."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Shopify success tax?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Shopify success tax refers to the percentage-based transaction and platform fees that grow as your revenue grows. As your D2C brand scales, your platform costs scale with it — structurally eroding your margins. MellowKraft builds custom platforms that remove this dependency entirely."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take MellowKraft to build a custom ecommerce platform?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MellowKraft's delivery framework runs in three phases: Architecture Audit (1 week), Blueprint and Planning (1 week), and Development and Testing (3–4 weeks) — a total transformation window of 4–6 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "Who is MellowKraft best suited for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MellowKraft is built for D2C brands crossing ₹5 lakh+ monthly sales, fashion and lifestyle commerce teams, and founders who feel constrained by their current platform architecture and want full ownership of their stack."
          }
        }
      ]
    }
